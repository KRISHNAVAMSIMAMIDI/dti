<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Missing Person</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #283593;
            margin-bottom: 20px;
            text-align: center;
            font-size: 36px; /* Increased font size for better visibility */
            font-weight: bold;
        }
        label {
            font-weight: bold;
            display: block;
            margin: 10px 0 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .form-group div {
            width: 48%; /* Two fields side by side */
            margin-bottom: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #D32F2F;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }
        .back-link {
            display: block;
            position: absolute;
            top: 10px;
            left: 10px;
            text-decoration: none;
            background: #D32F2F;
            color: white;
            padding: 5px 10px;
            border-radius: 2px;
            font-size: 16px;
        }

        .back-link:hover {
            background: #B71C1C;
        }

    </style>
</head>
<body>
    <a href="main.html" class="back-link">← Back</a>
    <div class="container">
        <h2>Report a Missing Person</h2>
        <form id="paymentForm" action="thank.html" method="GET" onsubmit="return validateForm()">
            <div class="form-group">
                <div>
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" required>
                </div>
                <div>
                    <label for="age">Age:</label>
                    <input type="number" id="age">
                </div>
            </div>
            <div class="form-group">
                <div>
                    <label for="gender">Gender:</label>
                    <select id="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label for="height">Height (cm):</label>
                    <input type="number" id="height">
                </div>
            </div>
            <div class="form-group">
                <div>
                    <label for="hairColor">Hair Color:</label>
                    <input type="text" id="hairColor">
                </div>
                <div>
                    <label for="marks">Identifying Marks (Moles, Scars, etc.):</label>
                    <input type="text" id="marks">
                </div>
            </div>
            <div class="form-group">
                <div>
                    <label for="dressColor">Dress Color:</label>
                    <input type="text" id="dressColor">
                </div>
                <div>
                    <label for="parentName">Parent's Name:</label>
                    <input type="text" id="parentName">
                </div>
            </div>
            <div class="form-group">
                <div>
                    <label for="parentPhone">Parent's Phone Number:</label>
                    <input type="tel" id="parentPhone">
                </div>
                <div>
                    <label for="location">Last Known Location:</label>
                    <input type="text" id="location">
                </div>
            </div>
            <div class="form-group">
                <div>
                    <label for="groupPhoto">Group Photo:</label>
                    <input type="file" id="groupPhoto" accept="image/*">
                </div>
                <div>
                    <label for="childPhoto">Child's Photo:</label>
                    <input type="file" id="childPhoto" accept="image/*">
                </div>
            </div>
            <div class="form-group">
                <div>
                    <label for="submissionFee">Submission Fee (₹500):</label>
                    <input type="number" id="submissionFee" value="500" readonly>
                </div>
                <div>
                    <label for="paymentMode">Payment Mode:</label>
                    <select id="paymentMode">
                        <option value="upi">UPI</option>
                        <option value="credit_card">Credit Card</option>
                        <option value="debit_card">Debit Card</option>
                        <option value="net_banking">Net Banking</option>
                    </select>
                </div>
            </div>
            <p style="text-align: center; margin-top: 10px;">₹500 submission fee is mandatory for submitting the application to prevent misuse of the app.</p>
            <div class="form-group">
                <div>
                    <label for="rewardAmount">Reward Amount (Payable to Finder):</label>
                    <input type="number" id="rewardAmount" placeholder="Enter reward amount">
                </div>
            </div>
            <button type="submit" class="btn">Proceed to Payment</button>
        </form>
    </div>

    <script>
        // Validate form before submitting
        function validateForm() {
            const fullName = document.getElementById("fullName").value;
            
            if (!fullName) {
                alert("Please enter the full name.");
                return false; // Prevent form submission if full name is not filled
            }

            return true; // Allow form submission if full name is filled
        }
    </script>
</body>
</html>
