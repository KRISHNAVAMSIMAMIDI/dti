<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Successful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #87CEEB;
        }
        .container {
            background: white;
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        h2 {
            color: #283593;
            margin-bottom: 20px;
            font-size: 32px; /* Increased size for better visibility */
        }
        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6; /* Improved readability */
        }
        .btn {
            display: inline-block;
            margin: 20px 0;
            padding: 12px 30px;
            color: white;
            background: #D32F2F;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 18px; /* Increased button text size */
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background: #B71C1C; /* Button hover effect */
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Submission Successful!</h2>
        <p>Thank you for reporting. Your submission will help in reuniting families.</p>
        <p>Stay hopeful. We are working tirelessly to find missing persons.</p>
        <a href="main.html" class="btn">Return to Home</a>
    </div>
</body>
</html>
