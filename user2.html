<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing Person Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #64b5f6, #1e88e5); /* Same gradient as main page */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: #fff;
            padding: 0;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 900px; /* Increased max-width for better laptop display */
            background: white;
            padding: 30px;
            margin-top: 40px; /* Adjusted for better positioning */
            border-radius: 15px; /* Rounded corners for a smoother look */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); /* Enhanced shadow for better separation */
            text-align: center;
            color: #283593;
            overflow: hidden; /* Prevents content from overflowing the container */
        }

        .container img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
        }

        .details {
            text-align: left;
            margin-top: 20px;
            color: #17171a;
        }

        .details p {
            font-size: 18px;
            margin: 8px 0;
        }

        .buttons {
            margin-top: 30px;
        }

        .buttons button {
            padding: 12px 30px; /* Increased padding for better button appearance */
            font-size: 18px; /* Larger font size for better readability */
            margin: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: #FFFFFF;
            transition: 0.3s;
            min-width: 200px; /* Ensures button has a minimum width for better layout */
        }

        .real-world {
            background-color: #4CAF50;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 5px;
            color: #FFFFFF;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .real-world:hover {
            background-color: #388E3C;
        }

        .found {
            background-color: #D32F2F;
        }

        .found:hover {
            background-color: #b71c1c;
        }

        .search {
            background-color: #87CEEB;
            color: #283593;
        }

        .search:hover {
            background-color: #5faac5;
        }

        .back {
            background-color: #000000;
            padding: 12px 20px;
            font-size: 16px;
            margin: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: #FFFFFF;
            transition: 0.3s;
        }

        .back:hover {
            background-color: #333333;
        }

        /* Add styles to links inside buttons for better visibility */
        .buttons a {
            color: white;
            text-decoration: none;
        }

        .buttons a:hover {
            color: white;
        }

        @media (max-width: 768px) {
            /* Adjust container width on smaller screens */
            .container {
                width: 95%;
                padding: 20px;
            }

            .details p {
                font-size: 16px; /* Smaller text size on smaller screens */
            }

            .buttons button {
                padding: 12px 25px;
                font-size: 16px; /* Slightly smaller buttons on small screens */
                min-width: 160px;
            }
        }
    </style>
</head>
<body>
    <!-- Report Details Section -->
    <div class="container">
        <h2>Missing Person Details</h2>
        <img src="https://thecsrjournal.in/wp-content/uploads/2023/10/Girl-child-1.jpg" alt="Missing Person Photo">
        <div class="details">
            <p><strong>Name:</strong> Tulasi Palli</p>
            <p><strong>Age:</strong> 5</p>
            <p><strong>Gender:</strong> Male</p>
            <p><strong>Height:</strong> 3 feet</p>
            <p><strong>Weight:</strong> 15 lbs</p>
            <p><strong>Eye Color:</strong> Brown</p>
            <p><strong>Hair Color:</strong> Black</p>
            <p><strong>Last Seen:</strong> March 5, 2025, near Central Park, New York</p>
            <p><strong>Clothing:</strong> Pink dress with white shoes</p>
        </div>
        <div class="buttons">
            <button class="found"><a href="found.html">Found</a></button>
            <button class="search"><a href="search.html">Search</a></button>
            <button class="back"><a href="user1.html">Back</a></button>
        </div>
    </div>
</body>
</html>
