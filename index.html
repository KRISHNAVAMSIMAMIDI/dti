<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert 365 - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #64b5f6, #1e88e5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: bold;
            color: #fff;
        }

        .login-container p {
            font-size: 1rem;
            color: #e3f2fd;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #ffffff;
            border: none;
            border-radius: 5px;
            color: #333;
            font-size: 1rem;
        }

        .input-field:focus {
            outline: none;
            border: 2px solid #64b5f6;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .login-btn:hover {
            background-color: #c2185b;
        }

        .forgot-password {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #fff;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .otp-section {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Alert 365 - Login</h1>
        <p>Welcome back! Please enter your email to continue.</p>

        <!-- Login form -->
        <form id="login-form">
            <input type="email" id="email" class="input-field" placeholder="Email Address" required>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <!-- OTP section (hidden initially) -->
        <div class="otp-section" id="otp-section">
            <p>An OTP has been sent to your email. Please enter it below to continue.</p>
            <input type="text" id="otp" class="input-field" placeholder="Enter OTP" required>
            <button type="button" class="login-btn" onclick="navigateToNextPage()">Verify OTP</button>
        </div>

        <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
    </div>

    <script>
        // Simulated OTP generation and sending
        let generatedOTP = "123456"; // Simulated OTP

        // Handle login form submission (only email)
        document.getElementById('login-form').addEventListener('submit', function (event) {
            event.preventDefault(); // Prevent form submission

            // Simulate validating the email (no password required)
            const email = document.getElementById('email').value;

            if (email) {
                // Simulate sending OTP to email
                alert("OTP has been sent to your email: " + email);

                // Show OTP input section
                document.getElementById('otp-section').style.display = 'block';
            } else {
                alert("Please enter an email address.");
            }
        });

        // Function to navigate to next page (main.html)
        function navigateToNextPage() {
            // Regardless of OTP correctness, navigate to main.html
            window.location.href = "main.html"; // Replace with actual main page URL
        }
    </script>
</body>

</html>
